name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build APK
      uses: yukiarrr/cordova-build-action@v1
      with:
        platform: android
        package: com.renris.mine
        name: Renris Mine AI
        url: https://renris-mine-ai.vercel.app

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: renris-mine-ai
        path: "*.apk"