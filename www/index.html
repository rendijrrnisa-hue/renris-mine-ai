<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renris Mine AI</title>

<style>
body{
background:#020b1b;
color:white;
font-family:sans-serif;
text-align:center;
}

.card{
background:#071a33;
padding:20px;
margin:15px;
border-radius:15px;
}

button{
background:#00e5ff;
border:none;
padding:12px;
margin:5px;
border-radius:10px;
font-size:14px;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:#071a33;
padding:10px;
}

</style>
</head>

<body>

<h1>Renris Mine AI</h1>

<div class="card">
<h3>Wallet</h3>
<p id="wallet"></p>
</div>

<div class="card">
<h3>Balance</h3>
<p id="balance">0 RAI</p>
</div>

<div>

<button onclick="startMining()">Start Mining</button>
<button onclick="withdraw()">Withdraw</button>

</div>

<div class="menu">

<button onclick="createWallet()">Create</button>
<button onclick="importWallet()">Import</button>
<button onclick="send()">Send</button>
<button onclick="history()">History</button>
<button onclick="settings()">Settings</button>

</div>

<script>

let wallet = localStorage.getItem("wallet")

function createWallet(){

wallet = "RAI"+Math.random().toString(36).substring(2,10)

localStorage.setItem("wallet",wallet)

document.getElementById("wallet").innerText = wallet

alert("Wallet Created")

}

function importWallet(){

let w = prompt("Enter Wallet")

localStorage.setItem("wallet",w)

wallet = w

document.getElementById("wallet").innerText = wallet

}

if(!wallet){
createWallet()
}else{
document.getElementById("wallet").innerText = wallet
}

function loadBalance(){
fetch("/balance/"+wallet)
.then(r=>r.json())
.then(d=>{
document.getElementById("balance").innerText =
d.balance + " RAI"
})
}

function startMining(){

setInterval(()=>{

fetch("/mine/"+wallet)

.then(()=>loadBalance())

},5000)

}

function withdraw(){
alert("Withdraw system coming soon")
}

function send(){

let to = prompt("Send to wallet")
let amount = prompt("Amount")

fetch("/send/"+wallet+"/"+to+"/"+amount)
.then(()=>loadBalance())

}

function history(){

fetch("/history/"+wallet)
.then(r=>r.json())
.then(d=>{

alert(JSON.stringify(d))

})

}

function settings(){

alert("Renris Mine AI v1.0")

}

loadBalance()

</script>

</body>
</html>
